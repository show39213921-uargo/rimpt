<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실제 회원 변화 결과 | 이예림 PT</title>
<meta name="description" content="회원 동의를 받은 전·후 비교 사진입니다. 슬라이더로 비포와 애프터를 비교해 보실 수 있습니다.">
<link rel="canonical" href="https://rim-pt.com/member-results.html">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:#fff; --accent2:#b0b0b0; --dark:#080808; --mid:#111; --card:#141414;
    --border:#222; --border-light:#2e2e2e; --text:#ebebeb; --muted:#707070; --muted2:#3a3a3a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Noto Sans KR',sans-serif;background:var(--dark);color:var(--text);
    max-width:480px;margin:0 auto;padding-bottom:2rem;
  }
  .top{
    position:sticky;top:0;z-index:20;background:rgba(8,8,8,.96);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);padding:.9rem 1rem;display:flex;justify-content:space-between;align-items:center;
  }
  .top a{color:var(--muted);text-decoration:none;font-size:.78rem}
  .top .cta{background:var(--accent);color:#101010;padding:.5rem .8rem;font-weight:700}
  .section-label{font-size:.62rem;letter-spacing:.15em;color:var(--muted2);margin-bottom:.55rem;text-transform:uppercase}
  h1{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:300;line-height:1.12;margin-bottom:.75rem}
  .lead{color:var(--muted);font-size:.84rem;line-height:1.8;font-weight:300;margin-bottom:1rem}
  section{padding:1.5rem 1.15rem 2rem}
  .ba-tabs{display:flex;gap:0;margin-bottom:1.5rem;border:1px solid var(--border);overflow:hidden}
  .ba-tab{
    flex:1;padding:.7rem .25rem;background:transparent;color:var(--muted);cursor:pointer;
    font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;border:none;border-right:1px solid var(--border);
    font-family:'Noto Sans KR',sans-serif;
  }
  .ba-tab:last-child{border-right:none}
  .ba-tab.active{background:var(--accent);color:var(--dark);font-weight:700}
  .ba-cases{display:flex;flex-direction:column;gap:1px;background:var(--border)}
  .ba-card{background:var(--card);overflow:hidden}
  details.ba-card-accordion{background:var(--card);overflow:hidden}
  .ba-card-summary{
    display:flex;align-items:center;justify-content:space-between;gap:.75rem;padding:.85rem 1.15rem;
    cursor:pointer;list-style:none;border-bottom:1px solid var(--border);font-family:'Noto Sans KR',sans-serif;
  }
  .ba-card-summary::-webkit-details-marker{display:none}
  details.ba-card-accordion>.ba-card-summary::marker{content:''}
  .ba-card-summary-text{flex:1;min-width:0;text-align:left}
  .ba-card-summary .ba-info-name{margin-bottom:.15rem;font-size:.84rem}
  .ba-card-summary .ba-info-sub{font-size:.68rem;color:var(--muted);font-weight:300}
  .ba-sum-chev{
    flex-shrink:0;width:1.85rem;height:1.85rem;border:1px solid var(--border-light);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--muted);
    transition:transform .22s ease,border-color .2s;
  }
  details.ba-card-accordion[open] .ba-sum-chev{transform:rotate(180deg)}
  .ba-card-summary:hover .ba-sum-chev{border-color:var(--accent2);color:var(--text)}
  .ba-card-panel{background:var(--card)}
  .ba-slider-wrap{position:relative;overflow:hidden;aspect-ratio:3/4;user-select:none;touch-action:pan-y}
  .ba-before,.ba-after{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .ba-before{background:var(--mid)}
  .ba-after{background:#181818}
  .ba-before-label,.ba-after-label{
    position:absolute;bottom:.8rem;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;padding:.28rem .7rem;font-weight:500;
  }
  .ba-before-label{left:.8rem;border:1px solid var(--border-light);color:var(--muted)}
  .ba-after-label{right:.8rem;background:var(--accent);color:var(--dark)}
  .ba-divider{
    position:absolute;top:0;bottom:0;width:1px;background:var(--accent);z-index:10;
    display:flex;align-items:center;justify-content:center;pointer-events:none;
  }
  .ba-divider-handle{
    width:36px;height:36px;border-radius:50%;background:var(--dark);border:1px solid var(--accent);
    display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:.7rem;position:absolute;
    box-shadow:0 0 12px rgba(0,0,0,.8);cursor:ew-resize;pointer-events:auto;touch-action:none;
  }
  .ba-after-clip{position:absolute;inset:0;overflow:hidden}
  .ba-img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;
    display:block;pointer-events:none;user-select:none;
  }
  .ba-before-label,.ba-after-label{z-index:2}
  .ba-card--multi .ba-slider-wrap{display:flex;flex-direction:row;align-items:stretch;touch-action:auto}
  .ba-card--multi .ba-before{position:relative;flex:1;min-width:0;width:50%;height:100%}
  .ba-card--multi .ba-after-clip{
    position:relative;flex:1;min-width:0;width:50%;height:100%;clip-path:none!important;overflow:hidden;border-left:1px solid var(--border);
  }
  .ba-card--multi .ba-after{position:absolute;inset:0}
  .ba-card--multi .ba-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
  .ba-card--multi .ba-divider{display:none!important}
  @media (max-width:440px){
    .ba-card--multi .ba-slider-wrap{flex-direction:column;aspect-ratio:3/5}
    .ba-card--multi .ba-before,.ba-card--multi .ba-after-clip{width:100%;flex:1;min-height:0}
    .ba-card--multi .ba-after-clip{border-left:none;border-top:1px solid var(--border)}
  }
  .ba-info{padding:1.1rem 1.2rem;border-top:1px solid var(--border)}
  .ba-info-name{font-weight:500;font-size:.84rem;margin-bottom:.15rem}
  .ba-info-sub{font-size:.7rem;color:var(--muted);font-weight:300}
  .ba-info-stats{display:flex;gap:1.5rem;margin-top:.8rem;flex-wrap:wrap}
  .ba-info-stat-val{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400;color:var(--accent)}
  .ba-info-stat-lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .ba-pair-strip{padding:.65rem 1rem .75rem;border-bottom:1px solid var(--border);background:rgba(0,0,0,.22)}
  .ba-pair-toggle{display:flex;gap:.4rem;margin-bottom:.55rem;flex-wrap:wrap}
  .ba-pair-btn{
    flex:1;font-size:.62rem;letter-spacing:.06em;padding:.45rem .35rem;border:1px solid var(--border);
    background:transparent;color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;border-radius:8px;
    transition:border-color .2s,color .2s,background .2s;
  }
  .ba-pair-btn.active{border-color:var(--accent);color:var(--text);background:rgba(255,255,255,.04)}
  .ba-mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem}
  .ba-mini-grid.ba-mini-grid--many{grid-template-columns:repeat(auto-fit,minmax(3.25rem,1fr))}
  .ba-pair-host:empty{display:none}
  .ba-mini-tile{
    position:relative;margin:0;padding:0;border:2px solid transparent;border-radius:8px;overflow:hidden;
    cursor:pointer;background:#0f0f0f;aspect-ratio:1;transition:border-color .2s;
  }
  .ba-mini-tile.active{border-color:var(--accent)}
  .ba-mini-lbl{
    position:absolute;bottom:0;left:0;right:0;z-index:1;font-size:.48rem;letter-spacing:.04em;padding:.2rem .25rem;
    background:rgba(0,0,0,.72);color:#c8c8c8;text-align:center;
  }
  .ba-mini-img{display:block;width:100%;height:100%;object-fit:cover;object-position:center top}
</style>
</head>

<script>
var BA_CONTENTS_INDEX = {
  slides: [
    {
      code: '김00',
      category: 'diet',
      before: 'assets/contents/WhatsApp Image 2026-04-28 at 11.54.19 AM.jpeg',
      after: 'assets/contents/WhatsApp Image 2026-04-28 at 11.54.20 AM.jpeg',
      member: '김00 회원님',
      infoSub: '체중 감량 프로그램',
      stats: [
        { val: '-15kg', lbl: '체중' },
        { val: '90일', lbl: '기간' },
      ],
    },
    {
      code: '엄00',
      category: 'diet',
      before: 'assets/contents/WhatsApp Image 2026-04-29 at 2.12.39 PM.jpeg',
      after: 'assets/contents/WhatsApp Image 2026-04-29 at 2.12.40 PM.jpeg',
      member: '엄00 회원님',
      infoSub: '체중 감량 프로그램',
      stats: [
        { val: '-10kg', lbl: '체중' },
        { val: '180일', lbl: '기간' },
      ],
    },
    {
      code: '주00',
      category: 'diet',
      before: 'assets/contents/주00비포.jpg',
      after: 'assets/contents/주00애프터.jpg',
      member: '주00 회원님 · 여성 · 28세',
      infoSub: '3개월 체지방 감량 프로그램',
      stats: [
        { val: '-9kg', lbl: '체지방량' },
        { val: '90일', lbl: '기간' },
      ],
    },
  ],
};
function baEncPath(relPath) {
  if (!relPath) return '';
  return relPath.split('/').map(function (seg) { return encodeURIComponent(seg); }).join('/');
}
function applyBaContentsIndex() {
  var root = document.getElementById('main-ba-cases');
  if (!root || !BA_CONTENTS_INDEX.slides) return;
  var cards = root.querySelectorAll('.ba-card');
  BA_CONTENTS_INDEX.slides.forEach(function (row, i) {
    var card = cards[i];
    if (!card) return;
    var pair0 = null;
    if (row.pairs && row.pairs.length) pair0 = row.pairs[0];
    else if (row.before && row.after) pair0 = { before: row.before, after: row.after };
    if (!pair0) return;
    var beforeImg = card.querySelector('.ba-before .ba-img');
    var afterImg = card.querySelector('.ba-after .ba-img');
    if (beforeImg) {
      beforeImg.src = baEncPath(pair0.before);
      beforeImg.alt = (row.code || '') + ' 회원 변화 전';
    }
    if (afterImg) {
      afterImg.src = baEncPath(pair0.after);
      afterImg.alt = (row.code || '') + ' 회원 변화 후';
    }
    if (row.category) card.dataset.category = row.category;
    if (row.member) {
      card.querySelectorAll('[data-ba-member]').forEach(function (el) { el.textContent = row.member; });
    }
    if (row.infoSub) {
      card.querySelectorAll('.ba-info-sub').forEach(function (el) { el.textContent = row.infoSub; });
    }
    var statsEl = card.querySelector('.ba-info-stats');
    if (statsEl && row.stats && row.stats.length) {
      statsEl.innerHTML = '';
      row.stats.forEach(function (s) {
        var wrap = document.createElement('div');
        wrap.className = 'ba-info-stat';
        var val = document.createElement('div');
        val.className = 'ba-info-stat-val';
        val.textContent = s.val;
        var lbl = document.createElement('div');
        lbl.className = 'ba-info-stat-lbl';
        lbl.textContent = s.lbl;
        wrap.appendChild(val);
        wrap.appendChild(lbl);
        statsEl.appendChild(wrap);
      });
    }
  });
}
applyBaContentsIndex();

function initBaMultiPairForRoot(root, slides) {
  if (!root || !slides || !slides.length) return;
  var cards = root.querySelectorAll('.ba-card');
  slides.forEach(function (row, i) {
    var card = cards[i];
    var host = card ? card.querySelector('.ba-pair-host') : null;
    if (!card || !host) return;
    host.innerHTML = '';
    card.classList.toggle('ba-card--multi', !!(row.pairs && row.pairs.length > 1));
    if (!row.pairs || row.pairs.length <= 1) return;
    var nPair = row.pairs.length;
    var beforeImg = card.querySelector('.ba-before .ba-img');
    var afterImg = card.querySelector('.ba-after .ba-img');
    if (!beforeImg || !afterImg) return;
    var strip = document.createElement('div');
    strip.className = 'ba-pair-strip';
    strip.setAttribute('aria-label', (row.code || '회원') + ' 전후 사진 세트');
    var toggle = document.createElement('div');
    toggle.className = 'ba-pair-toggle';
    toggle.setAttribute('role', 'group');
    for (var j = 0; j < nPair; j++) {
      var pbtn = document.createElement('button');
      pbtn.type = 'button';
      pbtn.className = 'ba-pair-btn' + (j === 0 ? ' active' : '');
      pbtn.setAttribute('data-ba-pair', String(j));
      pbtn.textContent = (j + 1) + '차 전후';
      toggle.appendChild(pbtn);
    }
    var grid = document.createElement('div');
    grid.className = 'ba-mini-grid';
    if (nPair * 2 > 4) grid.classList.add('ba-mini-grid--many');
    function beforeLbl(jj) { return jj === 0 ? '비포' : '비포' + (jj + 1); }
    function afterLbl(jj) { return jj === 0 ? '애프터' : '애프터' + (jj + 1); }
    for (var b = 0; b < nPair; b++) {
      var tb = document.createElement('button');
      tb.type = 'button';
      tb.className = 'ba-mini-tile' + (b === 0 ? ' active' : '');
      tb.setAttribute('data-ba-pair', String(b));
      var spb = document.createElement('span');
      spb.className = 'ba-mini-lbl';
      spb.textContent = beforeLbl(b);
      var imb = document.createElement('img');
      imb.className = 'ba-mini-img';
      imb.alt = '';
      imb.loading = 'lazy';
      imb.src = baEncPath(row.pairs[b].before);
      tb.appendChild(spb);
      tb.appendChild(imb);
      grid.appendChild(tb);
    }
    for (var a = 0; a < nPair; a++) {
      var ta = document.createElement('button');
      ta.type = 'button';
      ta.className = 'ba-mini-tile' + (a === 0 ? ' active' : '');
      ta.setAttribute('data-ba-pair', String(a));
      var spa = document.createElement('span');
      spa.className = 'ba-mini-lbl';
      spa.textContent = afterLbl(a);
      var ima = document.createElement('img');
      ima.className = 'ba-mini-img';
      ima.alt = '';
      ima.loading = 'lazy';
      ima.src = baEncPath(row.pairs[a].after);
      ta.appendChild(spa);
      ta.appendChild(ima);
      grid.appendChild(ta);
    }
    strip.appendChild(toggle);
    strip.appendChild(grid);
    host.appendChild(strip);
    var cur = 0;
    function setPair(raw) {
      var idx = parseInt(raw, 10);
      if (isNaN(idx)) idx = 0;
      cur = Math.max(0, Math.min(idx, nPair - 1));
      var p = row.pairs[cur];
      beforeImg.src = baEncPath(p.before);
      afterImg.src = baEncPath(p.after);
      strip.querySelectorAll('.ba-pair-btn').forEach(function (btn, jj) { btn.classList.toggle('active', jj === cur); });
      strip.querySelectorAll('.ba-mini-tile').forEach(function (t) {
        var pi = parseInt(t.getAttribute('data-ba-pair'), 10);
        t.classList.toggle('active', pi === cur);
      });
    }
    strip.querySelectorAll('.ba-pair-btn').forEach(function (btn, jj) { btn.addEventListener('click', function () { setPair(jj); }); });
    strip.querySelectorAll('.ba-mini-tile').forEach(function (t) {
      t.addEventListener('click', function () { setPair(parseInt(t.getAttribute('data-ba-pair'), 10)); });
    });
  });
}
initBaMultiPairForRoot(document.getElementById('main-ba-cases'), BA_CONTENTS_INDEX.slides);

function initSlider(wId, aId, dId) {
  var wrap = document.getElementById(wId);
  if (wrap && wrap.closest('.ba-card--multi')) return;
  var clip = document.getElementById(aId);
  var div = document.getElementById(dId);
  var handle = div ? div.querySelector('.ba-divider-handle') : null;
  if (!wrap || !clip || !div || !handle) return;
  var drag = false;
  function set(x) {
    var r = wrap.getBoundingClientRect();
    var p = Math.min(Math.max((x - r.left) / r.width * 100, 3), 97);
    div.style.left = p + '%';
    clip.style.clipPath = 'inset(0 ' + (100 - p) + '% 0 0)';
  }
  handle.addEventListener('mousedown', function (e) { drag = true; e.preventDefault(); });
  handle.addEventListener('touchstart', function (e) { drag = true; e.preventDefault(); }, { passive: false });
  window.addEventListener('mousemove', function (e) { if (drag) set(e.clientX); });
  window.addEventListener('touchmove', function (e) {
    if (drag) { set(e.touches[0].clientX); e.preventDefault(); }
  }, { passive: false });
  window.addEventListener('mouseup', function () { drag = false; });
  window.addEventListener('touchend', function () { drag = false; });
}
initSlider('slider1', 'after1', 'div1');
initSlider('slider2', 'after2', 'div2');
initSlider('slider3', 'after3', 'div3');

document.querySelectorAll('.ba-tab').forEach(function (tab) {
  tab.addEventListener('click', function () {
    document.querySelectorAll('.ba-tab').forEach(function (t) { t.classList.remove('active'); });
    tab.classList.add('active');
    var f = tab.dataset.filter;
    document.querySelectorAll('#main-ba-cases .ba-card').forEach(function (c) {
      c.style.display = (f === 'all' || c.dataset.category === f) ? 'block' : 'none';
    });
  });
});
