<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>이예림 PT — 인쇄용 QR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, "Noto Sans KR", sans-serif;
      background: #111;
      color: #ccc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .toolbar button,
    .toolbar a {
      font-size: 0.78rem;
      padding: 0.55rem 0.9rem;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #eee;
      cursor: pointer;
      text-decoration: none;
    }
    .toolbar button.primary {
      background: #fff;
      color: #111;
      border-color: #fff;
      font-weight: 700;
    }
    .sheet {
      background: #fff;
      padding: 14px;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    #qr {
      display: block;
      width: min(72vmin, 420px);
      height: auto;
    }
    .hint {
      margin-top: 0.75rem;
      font-size: 0.7rem;
      color: #666;
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    @media print {
      body {
        background: #fff;
        color: #000;
        padding: 0;
        display: block;
      }
      .no-print { display: none !important; }
      .sheet {
        box-shadow: none;
        border-radius: 0;
        padding: 0;
        margin: 0 auto;
        background: #fff;
      }
      #qr {
        width: 160mm;
        height: 160mm;
        max-width: 100%;
        max-height: 100%;
        margin: 0 auto;
      }
      @page {
        margin: 10mm;
        size: auto;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar no-print">
    <button type="button" class="primary" onclick="window.print()">인쇄 (QR만)</button>
    <a href="qr.html">일반 QR 페이지</a>
    <a href="index.html">메인</a>
  </div>

  <div class="sheet">
    <img id="qr" src="" alt="rim-pt.com QR" width="800" height="800">
  </div>
  <p class="hint no-print">인쇄 미리보기에서는 주변 UI가 보이며, 실제 인쇄 시에는 QR만 출력됩니다.</p>

  <script>
    (function () {
      var SITE = "https://rim-pt.com/";
      var enc = encodeURIComponent(SITE);
      document.getElementById("qr").src =
        "https://api.qrserver.com/v1/create-qr-code/?size=800x800&margin=12&data=" + enc;
    })();
  </script>
</body>
</html>
